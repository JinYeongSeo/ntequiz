<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이환 맞추기</title>
    <link rel="icon" type="image/png" href="images/favicon.png">
    <script defer src="/_vercel/insights/script.js"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; user-select: none; }
        body { background: #0a0a0a; color: #fff; overflow: hidden; } /* 퓨어 다크 배경 */

        .screen { display: none; width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 10; background: #0a0a0a; }
        .active { display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* 폴백(Fallback) 배경 - 흐리게 */
        #screen-menu, #screen-end {
            background-color: #0a0a0a;
            background-image: url('images/pc.jpg');
            background-size: cover; background-position: center; background-blend-mode: overlay; 
        }
        @media screen and (max-width: 768px) {
            #screen-menu, #screen-end { background-image: url('images/mobile.jpg'); }
        }

        /* 그라데이션 뺀 트렌디한 솔리드 글래스 버튼 */
        .btn { 
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1); color: #fff; 
            padding: 15px 40px; font-size: 1.2rem; cursor: pointer; border-radius: 50px; 
            margin: 10px; transition: all 0.2s ease; font-weight: 700;
        }
        .btn:hover { background: rgba(255, 255, 255, 0.9); color: #000; transform: translateY(-2px); }

        .title { font-size: 4rem; font-weight: 900; margin-bottom: 2rem; letter-spacing: -1px; }
        .input-group { margin: 20px 0; display: flex; gap: 10px; }
        .input-name { padding: 15px 20px; font-size: 1.2rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.5); color: #fff; text-align: center; outline: none; transition: 0.3s; }
        .input-name:focus { border-color: #f39c12; }

        .mini-boards-wrapper { display: flex; gap: 20px; margin-top: 20px; flex-wrap: wrap; justify-content: center; }
        .mini-board { 
            background: rgba(20, 20, 20, 0.6); backdrop-filter: blur(12px); 
            padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.08); 
            width: 300px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }
        .mini-board h3 { text-align: center; margin-bottom: 15px; font-size: 1.2rem; color: #aaa; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; font-weight: 800; }
        .mini-row { display: flex; justify-content: space-between; font-size: 1.05rem; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .mini-row:last-child { border-bottom: none; }

        #game-screen { display: none; position: relative; width: 100vw; height: 100vh; z-index: 1; }
        
        .top-bar { position: absolute; top: 2vh; left: 3vw; right: 3vw; display: flex; justify-content: space-between; align-items: center; z-index: 20; font-size: 1.6rem; font-weight: 800; }
        #giveup-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 8px 25px; border-radius: 30px; cursor: pointer; font-size: 1.1rem; transition: 0.2s; backdrop-filter: blur(5px); font-weight: 600; }
        #giveup-btn:hover { background: #f44336; border-color: #f44336; color: #fff; }

        .question-bar { 
            position: absolute; top: 10vh; left: 50%; transform: translateX(-50%); z-index: 20; 
            background: rgba(15, 15, 15, 0.75); padding: 15px 40px; border-radius: 40px; 
            font-size: 2rem; font-weight: 900; text-align: center; white-space: nowrap; 
            border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(12px); box-shadow: 0 8px 32px rgba(0,0,0,0.5); 
        }

        .split-container { display: flex; width: 100vw; height: 100vh; flex-direction: row; }
        .panel { flex: 1; position: relative; background-size: contain; background-position: center; background-repeat: no-repeat; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.3s; cursor: pointer; border-right: 1px solid rgba(255,255,255,0.05); background-color: #0a0a0a; }
        .panel:last-child { border-right: none; }

        /* 패널 다크 오버레이 */
        .panel::before { content: ''; position: absolute; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.6); z-index: 2; transition: background 0.3s; }
        .panel-fallback { background-image: url('images/pc.jpg'); background-size: cover !important; background-position: center !important; }
        @media screen and (max-width: 768px) { .panel-fallback { background-image: url('images/mobile.jpg'); } }
        .panel.panel-fallback::before { background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); }
        
        .panel:hover::before { background: rgba(0,0,0,0.3); }
        .panel.panel-fallback:hover::before { background: rgba(0,0,0,0.7); backdrop-filter: blur(15px); }

        .panel-content { position: relative; z-index: 5; text-align: center; pointer-events: none; max-width: 40vw; }
        #panel-left .panel-content { transform: translateX(-12vw); }
        #panel-right .panel-content { transform: translateX(12vw); }
        
        .text-plate {
            background: rgba(15, 15, 15, 0.85); border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 20px 30px; border-radius: 24px; display: inline-flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            font-size: 2.2rem; font-weight: 800; color: #fff;
            white-space: pre-wrap; word-break: keep-all; line-height: 1.35;
        }

        .item-sub { font-size: 1.4rem; color: #888; margin-top: 15px; font-weight: 700; }

        /* 중앙 박스 살짝 더 키움 */
        .vs-badge { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: clamp(280px, 28vw, 420px); height: clamp(280px, 28vw, 420px); 
            background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); 
            display: flex; align-items: center; justify-content: center; z-index: 10; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.8); padding: 15px; pointer-events: none; 
        }
        .vs-badge img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 12px; }

        .ponz-icon { height: 45px; width: 45px; object-fit: contain; border-radius: 50%; border: 1px solid #555; background: #000; padding: 6px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }

        #effect-overlay { position: absolute; top:0; left:0; width:100vw; height:100vh; z-index: 50; pointer-events: none; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.1s ease-out; }
        #effect-icon { font-size: 8rem; font-weight: 900; transform: scale(0.5); transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275); letter-spacing: 5px; }
        .flash-correct { background: rgba(76, 175, 80, 0.1); }
        .flash-wrong { background: rgba(244, 67, 54, 0.15); }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-15px); }
            40%, 80% { transform: translateX(15px); }
        }
        .shake-anim { animation: shake 0.35s; }

        /* 리더보드 (플랫 디자인) */
        .board-container { display: flex; gap: 30px; margin-top: 20px; max-height: 60vh; overflow-y: auto; padding-right: 10px; }
        .board-container::-webkit-scrollbar { width: 6px; }
        .board-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
        .board { background: rgba(20, 20, 20, 0.6); backdrop-filter: blur(15px); padding: 25px; border-radius: 20px; min-width: 320px; border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .board h2 { text-align: center; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; color: #fff; font-weight: 800; font-size: 1.5rem; }
        .rank-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 1.1rem; font-weight: 600; color: #ccc; }
        .rank-row:last-child { border: none; }
        .rank-num { color: #fff; font-weight: 900; width: 40px; }

        /* 오답노트 모달 */
        #screen-review { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: rgba(0,0,0,0.85); z-index: 100; justify-content: center; align-items: center; backdrop-filter: blur(6px); }
        #screen-review.active { display: flex; }
        .review-modal { width: 90%; max-width: 900px; background: rgba(15, 15, 15, 0.95); border-radius: 24px; padding: 35px; border: 1px solid rgba(255,255,255,0.1); max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .review-modal::-webkit-scrollbar { width: 6px; }
        .review-modal::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
        
        .review-item { padding: 20px; margin-bottom: 20px; border-radius: 12px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); }
        .correct-item { border-left: 4px solid #4CAF50; }
        .wrong-item { border-left: 4px solid #f44336; }
        .review-q { font-size: 1.3rem; font-weight: 900; margin-bottom: 15px; color: #fff; }
        .review-ans { font-size: 1.1rem; color: #aaa; display: flex; flex-direction: column; gap: 10px; font-weight: 600; }
        .review-thumb { height: 50px; max-width: 100px; object-fit: contain; vertical-align: middle; margin-right: 12px; border-radius: 8px; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); padding: 2px; }
        .review-center { text-align: center; margin-bottom: 20px; }
        .review-center img { max-width: 250px; max-height: 250px; border-radius: 16px; object-fit: contain; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.5); padding: 10px; }
        .choice-wrapper { display: flex; align-items: center; font-weight: bold; color: #fff; }

        @media screen and (max-width: 768px) {
            .title { font-size: 2.8rem; }
            .question-bar { font-size: 1.4rem; top: 12vh; padding: 12px 25px; }
            
            /* 상하 배치로 변경 */
            .split-container { flex-direction: column; }
            .panel { border-right: none; border-bottom: 1px solid rgba(255,255,255,0.05); }
            .panel:last-child { border-bottom: none; }
            
            /* 텍스트 박스 위치 조정 */
            .panel-content { max-width: 85vw; }
            #panel-left .panel-content { transform: translateY(-10vh) translateX(0); }
            #panel-right .panel-content { transform: translateY(10vh) translateX(0); }
            
            .text-plate { font-size: 1.5rem; padding: 15px 20px; gap: 8px; }
            .ponz-icon { height: 35px; width: 35px; }
            .vs-badge { width: 160px; height: 160px; padding: 10px; border-radius: 16px; }
            #effect-icon { font-size: 5rem; }
            .mini-board { width: 100%; }
        }
    </style>
</head>
<body>

    <div id="screen-menu" class="screen active">
        <div class="title">이환 맞추기</div>
        <div>
            <button class="btn" onclick="startGame('normal')">일반 게임 시작</button>
            <button class="btn" onclick="startGame('time')">타임어택 시작 (60초)</button>
            <button class="btn" onclick="showScreen('screen-leaderboard'); renderLeaderboard();">랭킹</button>
        </div>
        
        <div class="mini-boards-wrapper">
            <div class="mini-board">
                <h3>일반 모드 TOP 5</h3>
                <div id="main-top5-normal">기록이 없습니다.</div>
            </div>
            <div class="mini-board">
                <h3>타임어택 TOP 5</h3>
                <div id="main-top5-time">기록이 없습니다.</div>
            </div>
        </div>
    </div>

    <div id="game-screen">
        <div class="top-bar">
            <div>점수 : <span id="score-display">0</span> <span id="timer-display" style="display:none; color:#f39c12; margin-left:20px;">남은 시간 : 60</span></div>
            <button id="giveup-btn" onclick="endGame()">포기</button>
        </div>
        
        <div class="question-bar" id="question-text">문제를 불러오는 중...</div>
        
        <div class="split-container">
            <div class="panel" id="panel-left" onclick="checkAnswer(0)">
                <div class="panel-content">
                    <div id="left-title"></div>
                    <div class="item-sub" id="left-sub"></div>
                </div>
            </div>
            
            <div class="vs-badge" id="vs-element"></div>
            
            <div class="panel" id="panel-right" onclick="checkAnswer(1)">
                <div class="panel-content">
                    <div id="right-title"></div>
                    <div class="item-sub" id="right-sub"></div>
                </div>
            </div>
        </div>
        
        <div id="effect-overlay">
            <div id="effect-icon"></div>
        </div>
    </div>

    <div id="screen-end" class="screen">
        <div class="title">게임 종료</div>
        <h2 style="font-size: 2.2rem; margin-bottom: 25px; font-weight: 800;">최종 점수: <span id="final-score" style="color: #fff; font-size: 3.5rem;">0</span>점</h2>
        
        <div class="input-group">
            <input type="text" id="player-name" class="input-name" placeholder="닉네임 입력 (최대 20자)" maxlength="20">
            <button class="btn" style="background: rgba(255,255,255,0.9); color: #000;" onclick="saveScore()">랭킹 등록</button>
        </div>

        <div class="mini-boards-wrapper">
            <div class="mini-board">
                <h3>일반 모드 TOP 5</h3>
                <div id="main-top5-normal-end">기록이 없습니다.</div>
            </div>
            <div class="mini-board">
                <h3>타임어택 TOP 5</h3>
                <div id="main-top5-time-end">기록이 없습니다.</div>
            </div>
        </div>
        
        <div style="margin-top: 25px;">
            <button class="btn" onclick="showScreen('screen-review'); renderReview();">결과 자세히</button>
            <button class="btn" id="restart-btn">다시 하기</button>
            <button class="btn" onclick="showScreen('screen-menu'); renderLeaderboard();">메인으로</button>
        </div>
    </div>

    <div id="screen-review" class="screen">
        <div class="review-modal">
            <div class="title" style="font-size: 2.5rem; text-align: center; margin-bottom: 30px;">결과 자세히</div>
            <div id="review-list"></div>
        </div>
    </div>

    <div id="screen-leaderboard" class="screen">
        <div class="title" style="font-size: 3rem;">TOP 50</div>
        <div class="board-container">
            <div class="board">
                <h2>일반 모드</h2>
                <div id="list-normal">기록이 없습니다.</div>
            </div>
            <div class="board">
                <h2>타임어택</h2>
                <div id="list-time">기록이 없습니다.</div>
            </div>
        </div>
        <button class="btn" style="margin-top: 30px;" onclick="showScreen('screen-menu'); renderLeaderboard();">메인으로</button>
    </div>

201	이 보스의 드랍템은?	aa6.png			aa4.png			tt4.png	1
202	이 보스의 드랍템은?	aa5.png			aa1.png			tt5.png	0
203	이 보스의 드랍템은?	aa2.png			aa6.png			tt6.png	1
204	이 보스의 드랍템은?	aa7.png			aa3.png			tt7.png	0
205	금 사과씨	aaa1.png			aaa2.png				0
206	리퀴드 드림 캔	aaa4.png			aaa3.png				1
207	스페셜 냉디저트	aaa5.png			aaa1.png				0
        `;

        function parseTSV(tsv) {
            const lines = tsv.trim().split('\n');
            return lines.map(line => {
                const cols = line.split('\t').map(c => c ? c.trim() : '');
                if (cols.length < 10) return null; 
                
                // 데이터 보정: 제목 칸에 .png/.jpg가 들어간 경우 이미지 칸으로 자동 이동
                if (cols[3] && (cols[3].endsWith('.png') || cols[3].endsWith('.jpg')) && !cols[2]) {
                    cols[2] = cols[3]; cols[3] = '';
                }
                if (cols[6] && (cols[6].endsWith('.png') || cols[6].endsWith('.jpg')) && !cols[5]) {
                    cols[5] = cols[6]; cols[6] = '';
                }

                return {
                    id: cols[0],
                    question: cols[1],
                    left: { img: cols[2], title: cols[3], sub: cols[4] },
                    right: { img: cols[5], title: cols[6], sub: cols[7] },
                    center_img: cols[8],
                    answer: parseInt(cols[9], 10)
                };
            }).filter(q => q && q.id && !isNaN(q.answer));
        }

        const quizDB = parseTSV(rawTSV);

        let currentMode = 'normal';
        let currentQuizList = [];
        let currentIndex = 0;
        let score = 0;
        let timerInterval = null;
        let timeLeft = 60;
        let isProcessing = false;
        let gameHistory = []; 

        window.onload = () => { 
            renderLeaderboard(); 
            document.getElementById('screen-review').addEventListener('click', function(e) {
                if (e.target === this) {
                    showScreen('screen-end');
                }
            });
        };

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
            document.getElementById('game-screen').style.display = 'none';
            if(id === 'game-screen') {
                document.getElementById(id).style.display = 'block';
            } else {
                document.getElementById(id).classList.add('active');
            }
        }

        function shuffleArray(arr) {
            return arr.map(a => [Math.random(), a]).sort((a, b) => a[0] - b[0]).map(a => a[1]);
        }

        function getImgPath(path) {
            if (!path || path.trim() === "") return "";
            if (path.startsWith("http") || path.startsWith("images/")) return path;
            return `images/${path}`;
        }

        function startGame(mode) {
            if(quizDB.length === 0) {
                alert("문제 데이터가 없음! rawTSV 안에 시트 복붙 제대로 했는지 확인 ㄱㄱ");
                return;
            }
            currentMode = mode;
            score = 0;
            currentIndex = 0;
            gameHistory = []; 
            
            if(mode === 'normal') {
                currentQuizList = shuffleArray([...quizDB]).slice(0, 30);
            } else {
                currentQuizList = shuffleArray([...quizDB]);
            }
            
            document.getElementById('score-display').innerText = score;
            document.getElementById('timer-display').style.display = (mode === 'time') ? 'inline' : 'none';
            
            if(mode === 'time') {
                timeLeft = 60;
                document.getElementById('timer-display').innerText = `남은 시간 : ${timeLeft}`;
                clearInterval(timerInterval);
                timerInterval = setInterval(() => {
                    timeLeft--;
                    document.getElementById('timer-display').innerText = `남은 시간 : ${timeLeft}`;
                    if(timeLeft <= 0) endGame();
                }, 1000);
            }

            showScreen('game-screen');
            loadQuiz();
        }

        function loadQuiz() {
            if (currentIndex >= currentQuizList.length) {
                if (currentMode === 'time') {
                    currentQuizList = shuffleArray([...quizDB]);
                    currentIndex = 0;
                } else {
                    endGame();
                    return;
                }
            }

            const q = currentQuizList[currentIndex];
            document.getElementById('question-text').innerText = q.question;

            function getPonzHTML(text) {
                if (text && text.includes('폰즈')) {
                    return `<span>${text}</span> <img src="images/ponz.png" class="ponz-icon" alt="폰즈">`;
                }
                return `<span>${text}</span>`;
            }

            const pLeft = document.getElementById('panel-left');
            const leftImgPath = getImgPath(q.left.img);
            if (leftImgPath !== "" && !leftImgPath.includes('ponz.png')) {
                pLeft.style.backgroundImage = `url('${leftImgPath}')`;
                pLeft.classList.remove('panel-fallback');
            } else {
                pLeft.style.backgroundImage = '';
                pLeft.classList.add('panel-fallback'); 
            }
            const leftTitleContent = q.left.title ? `<div class="text-plate">${getPonzHTML(q.left.title)}</div>` : '';
            document.getElementById('left-title').innerHTML = leftTitleContent;
            document.getElementById('left-sub').innerText = q.left.sub || '';

            const pRight = document.getElementById('panel-right');
            const rightImgPath = getImgPath(q.right.img);
            if (rightImgPath !== "" && !rightImgPath.includes('ponz.png')) {
                pRight.style.backgroundImage = `url('${rightImgPath}')`;
                pRight.classList.remove('panel-fallback');
            } else {
                pRight.style.backgroundImage = '';
                pRight.classList.add('panel-fallback');
            }
            const rightTitleContent = q.right.title ? `<div class="text-plate">${getPonzHTML(q.right.title)}</div>` : '';
            document.getElementById('right-title').innerHTML = rightTitleContent;
            document.getElementById('right-sub').innerText = q.right.sub || '';

            const vsEl = document.getElementById('vs-element');
            const centerImgPath = getImgPath(q.center_img);
            if (centerImgPath !== "") {
                vsEl.style.display = "flex";
                vsEl.innerHTML = `<img src="${centerImgPath}">`;
            } else {
                vsEl.style.display = "none"; 
            }
            
            isProcessing = false;
        }

        function checkAnswer(selectedIndex) {
            if(isProcessing) return;
            isProcessing = true;

            const q = currentQuizList[currentIndex];
            const isCorrect = (selectedIndex === q.answer);
            
            gameHistory.push({ quiz: q, selected: selectedIndex, isCorrect: isCorrect });
            
            if(isCorrect) score += 1;
            document.getElementById('score-display').innerText = score;

            const flash = document.getElementById('effect-overlay');
            const icon = document.getElementById('effect-icon');
            const gameScreen = document.getElementById('game-screen');

            if (isCorrect) {
                flash.className = 'flash-correct';
                icon.innerText = '정답';
                icon.style.color = '#4CAF50';
            } else {
                flash.className = 'flash-wrong';
                icon.innerText = '오답';
                icon.style.color = '#f44336';
                gameScreen.classList.add('shake-anim');
            }

            flash.style.opacity = '1';
            icon.style.transform = 'scale(1)';

            setTimeout(() => {
                flash.style.opacity = '0';
                icon.style.transform = 'scale(0.5)';
                setTimeout(() => {
                    gameScreen.classList.remove('shake-anim');
                    currentIndex++; 
                    loadQuiz();
                }, 200);
            }, 500);
        }

        function endGame() {
            clearInterval(timerInterval);
            document.getElementById('final-score').innerText = score;
            document.getElementById('player-name').value = '';
            
            const restartBtn = document.getElementById('restart-btn');
            restartBtn.onclick = () => startGame(currentMode);

            renderEndScreenLeaderboard();
            showScreen('screen-end');
        }

        function renderEndScreenLeaderboard() {
            const normalBoard = JSON.parse(localStorage.getItem('leaderboard_normal')) || [];
            const timeBoard = JSON.parse(localStorage.getItem('leaderboard_time')) || [];
            
            const buildMiniListEnd = (data, elementId) => {
                const el = document.getElementById(elementId);
                if(data.length === 0) { el.innerHTML = '<div style="text-align:center; color:#aaa; font-size:0.9rem;">기록 없음</div>'; return; }
                el.innerHTML = data.slice(0, 5).map((item, idx) => 
                    `<div class="mini-row"><span><strong style="color:#f39c12;">${idx + 1}.</strong> ${item.name}</span><span>${item.score}점</span></div>`
                ).join('');
            };

            buildMiniListEnd(normalBoard, 'main-top5-normal-end');
            buildMiniListEnd(timeBoard, 'main-top5-time-end');
        }

        function getChoiceHTML(sideData) {
            let html = '<div class="choice-wrapper">';
            const imgPath = getImgPath(sideData.img);
            if (imgPath && !imgPath.includes('ponz.png')) {
                html += `<img src="${imgPath}" class="review-thumb" alt="thumb">`;
            }
            if (sideData.title) {
                html += `<span>${sideData.title}</span>`;
            }
            html += '</div>';
            return html !== '<div class="choice-wrapper"></div>' ? html : '<span style="color:#888;">데이터 없음</span>';
        }

        function renderReview() {
            const list = document.getElementById('review-list');
            if (gameHistory.length === 0) {
                list.innerHTML = '<p style="text-align:center; color:#ccc;">기록이 없습니다.</p>';
                return;
            }
            
            list.innerHTML = gameHistory.map((h, i) => {
                const q = h.quiz;
                
                const userAnsHTML = h.selected === 0 ? getChoiceHTML(q.left) : getChoiceHTML(q.right);
                const correctAnsHTML = q.answer === 0 ? getChoiceHTML(q.left) : getChoiceHTML(q.right);

                let centerImgHTML = '';
                const centerImgPath = getImgPath(q.center_img);
                if (centerImgPath !== "") {
                    centerImgHTML = `<div class="review-center"><img src="${centerImgPath}" alt="center"></div>`;
                }

                const itemClass = h.isCorrect ? 'correct-item' : 'wrong-item';
                const mark = h.isCorrect ? '<span style="color:#4CAF50;">✅ 정답</span>' : '<span style="color:#f44336;">❌ 오답</span>';

                return `
                <div class="review-item ${itemClass}">
                    <div class="review-q">Q${i+1}. ${q.question} <span style="float:right;">${mark}</span></div>
                    ${centerImgHTML}
                    <div class="review-ans">
                        <div>내 선택:</div> ${userAnsHTML}
                        <div style="margin-top:5px;">정답:</div> ${correctAnsHTML}
                    </div>
                </div>`;
            }).join('');
        }

        function saveScore() {
            const name = document.getElementById('player-name').value.trim() || '익명';
            const key = `leaderboard_${currentMode}`;
            let board = JSON.parse(localStorage.getItem(key)) || [];
            board.push({ name: name, score: score });
            
            board.sort((a, b) => b.score - a.score);
            board = board.slice(0, 50); 
            
            localStorage.setItem(key, JSON.stringify(board));
            showScreen('screen-leaderboard');
            renderLeaderboard();
        }

        function renderLeaderboard() {
            const normalBoard = JSON.parse(localStorage.getItem('leaderboard_normal')) || [];
            const timeBoard = JSON.parse(localStorage.getItem('leaderboard_time')) || [];
            
            const buildList = (data, elementId) => {
                const el = document.getElementById(elementId);
                if(data.length === 0) { el.innerHTML = '<div style="text-align:center; color:#aaa;">기록이 없습니다.</div>'; return; }
                el.innerHTML = data.map((item, idx) => 
                    `<div class="rank-row"><span class="rank-num">${idx + 1}</span><span>${item.name}</span><span>${item.score}점</span></div>`
                ).join('');
            };

            buildList(normalBoard, 'list-normal');
            buildList(timeBoard, 'list-time');

            const buildMiniList = (data, elementId) => {
                const el = document.getElementById(elementId);
                if(data.length === 0) { el.innerHTML = '<div style="text-align:center; color:#aaa; font-size:0.9rem;">기록 없음</div>'; return; }
                el.innerHTML = data.slice(0, 5).map((item, idx) => 
                    `<div class="mini-row"><span><strong style="color:#f39c12;">${idx + 1}.</strong> ${item.name}</span><span>${item.score}점</span></div>`
                ).join('');
            };

            buildMiniList(normalBoard, 'main-top5-normal');
            buildMiniList(timeBoard, 'main-top5-time');
        }
    </script>
